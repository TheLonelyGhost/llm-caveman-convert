version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive
    - bodyclose
    - gocritic
    - unparam
    - nilerr
    - errorlint
    - copyloopvar

  settings:
    gosec:
      excludes:
        - G304 # config paths are user-supplied by design
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
